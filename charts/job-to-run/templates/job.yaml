apiVersion: batch/v1
kind: Job
metadata:
  name: job-{{ .Values.taskType }}-{{ .Values.taskId }}
  labels:
    app.kubernetes.io/name: job-to-run
    app.kubernetes.io/instance: job-{{ .Values.taskType }}-{{ .Values.taskId }}
    reservoir.io/task-id: "{{ .Values.taskId }}"
    reservoir.io/task-type: "{{ .Values.taskType }}"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-to-run
        app.kubernetes.io/instance: job-{{ .Values.taskType }}-{{ .Values.taskId }}
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: "{{ (index .Values.workers .Values.taskType).repository }}:{{ (index .Values.workers .Values.taskType).tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: TASK_ID
              value: "{{ .Values.taskId }}"
            - name: TASK_TYPE
              value: "{{ .Values.taskType }}"
            - name: BACKEND_CALLBACK_URL
              value: "{{ .Values.backendCallbackUrl }}"
            - name: S3_ENDPOINT_URL
              value: "{{ .Values.s3EndpointUrl }}"
            - name: S3_BUCKET_NAME
              value: "{{ .Values.s3BucketName }}"
            - name: S3_OBJECT_KEY
              value: "{{ .Values.objectKey }}"
            - name: SHA256
              value: "{{ .Values.sha256 }}"
            - name: WORKER_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.workerCallbackSecret.name }}
                  key: {{ .Values.workerCallbackSecret.key }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3Credentials.name }}
                  key: {{ .Values.s3Credentials.accessKeyKey }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3Credentials.name }}
                  key: {{ .Values.s3Credentials.secretKeyKey }}
            {{- if eq .Values.taskType "ml" }}
            - name: RESERVOIR_SUMMARIZER_URL
              value: "{{ .Values.summarizer.url }}"
            - name: RESERVOIR_SUMMARIZER_TIMEOUT_SECONDS
              value: "{{ .Values.summarizer.timeoutSeconds }}"
            - name: STATIC_REPORT
              value: {{ .Values.staticReport | toJson | quote }}
            - name: STATIC_REPORT_S3_KEY
              value: "{{ .Values.staticReportS3Key }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
