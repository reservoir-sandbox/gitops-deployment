# One entry per TaskType (app/enums/task_type.py in the backend repo): static,
# sandbox, ml. Each maps to a worker image built by its own repo's CI
# (reverse, auto-yara, ml-models respectively) - see the top-level README.
workers:
  static:
    repository: ghcr.io/reservoir-sandbox/reverse
    tag: cbe715ecaa60338c5b9b89b3aa22a19f27bc56b3
  sandbox:
    repository: ghcr.io/reservoir-sandbox/auto-yara
    tag: 1018cf940644994118ba1cc8acda0ad0a6299cb5
  ml:
    repository: ghcr.io/reservoir-sandbox/ml-models
    tag: d0359cd6232fe2a7d471acc3928945f8b6208d6b
imagePullPolicy: IfNotPresent
workerCallbackSecret:
  name: worker-callback-secret
  key: token
# Mirrored into the jobs namespace by infrastructure/s3/garage-backend-key-init-job.yaml
s3Credentials:
  name: backend-s3-credentials
  accessKeyKey: access-key
  secretKeyKey: secret-key
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
