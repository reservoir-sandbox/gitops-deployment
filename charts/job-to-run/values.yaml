taskId: ""
taskType: ""
backendCallbackUrl: ""
s3EndpointUrl: ""
s3BucketName: ""
objectKey: ""
sha256: ""
# Only set by the backend when launching the ml task, once the static task
# it depends on has completed - see JobService._maybe_launch_ml in the
# backend repo. Exactly one of staticReport/staticReportS3Key is non-empty.
staticReport: ""
staticReportS3Key: ""
# LLM summarizer (see LLM_integration.md) - external to this cluster, reached
# over its public IP since the cluster isn't in the Yandex VPC. Its security
# group must allow inbound TCP 8000 from this cluster's egress IP.
summarizer:
  url: "http://158.160.219.46:8000"
  timeoutSeconds: 300
# One entry per TaskType (app/enums/task_type.py in the backend repo): static,
# sandbox, ml. Each maps to a worker image built by its own repo's CI
# (reverse, auto-yara, ml-models respectively) - see the top-level README.
workers:
  static:
    repository: ghcr.io/reservoir-sandbox/reverse
    tag: 0fdeee4f552b579e526ed52faff3858414829d7e
  sandbox:
    repository: ghcr.io/reservoir-sandbox/auto-yara
    tag: afe0118339495c8ea2e950ff8c2629ee593e3949
  ml:
    repository: ghcr.io/reservoir-sandbox/ml-models
    tag: d0359cd6232fe2a7d471acc3928945f8b6208d6b
imagePullPolicy: IfNotPresent
workerCallbackSecret:
  name: worker-callback-secret
  key: token
# Mirrored into the jobs namespace by infrastructure/s3/garage-backend-key-init-job.yaml
s3Credentials:
  name: backend-s3-credentials
  accessKeyKey: access-key
  secretKeyKey: secret-key
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
