apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: infrastructure
spec:
  interval: 10m
  releaseName: ingress-nginx
  chart:
    spec:
      chart: nginx
      version: "25.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami-registry
        namespace: flux-system
  values:
    replicaCount: 1
    service:
      type: NodePort
      ports:
        http: 80
        https: 443
      nodePorts:
        http: 30080 
        https: 30443
