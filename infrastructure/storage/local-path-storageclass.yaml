# Declares (rather than implicitly relies on) the StorageClass k3s's bundled
# local-path-provisioner creates automatically. Spec must stay identical to
# k3s's default or the two will fight on every k3s restart / Flux reconcile.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
