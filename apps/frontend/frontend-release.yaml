apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: apps
spec:
  interval: 10m
  releaseName: frontend
  chart:
    spec:
      chart: frontend
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/reservoir-sandbox/frontend
      tag: "ce9a6360c9a9add0d24f9970672e4f1d969010ed"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 80
