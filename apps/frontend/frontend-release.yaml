apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: apps
spec:
  interval: 10m
  releaseName: frontend
  chart:
    spec:
      chart: frontend
      version: "0.1.16"
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/reservoir-sandbox/frontend
      tag: "0477136c0e5c740576094c7dfe1ca6789896d822"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
