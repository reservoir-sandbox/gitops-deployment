apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: apps
spec:
  interval: 10m
  releaseName: frontend
  chart:
    spec:
      chart: frontend
      version: "0.1.18"
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/reservoir-sandbox/frontend
      tag: "be06679492eb0d29394acf82c78768b6165bb73d"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
