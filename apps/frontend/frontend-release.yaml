apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: apps
spec:
  interval: 10m
  releaseName: frontend
  chart:
    spec:
      chart: frontend
      version: "0.1.3"
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/reservoir-sandbox/frontend
      tag: "af314372b9bd5f3111f7a51130dfa8ff12661ce6"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
