apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend
  namespace: apps
spec:
  interval: 10m
  releaseName: backend
  chart:
    spec:
      chart: backend
      version: "0.1.5" # Will be automatically bumped by your CI pipeline
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    # Overriding only dynamic runtime values via GitOps
    image:
      repository: ghcr.io/reservoir-sandbox/backend
      tag: "507f239a89bd54cac5ef6c48c9414ed302958d83" # Example app commit SHA
      pullPolicy: IfNotPresent
