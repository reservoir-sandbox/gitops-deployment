apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backend
  namespace: apps
spec:
  interval: 10m
  releaseName: backend
  chart:
    spec:
      chart: backend
      version: "0.1.6" # Will be automatically bumped by your CI pipeline
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  values:
    # Overriding only dynamic runtime values via GitOps
    image:
      repository: ghcr.io/reservoir-sandbox/backend
      tag: "34f2fa443c502c8ae81f722fd285fa3f9783fb53" # Example app commit SHA
      pullPolicy: IfNotPresent
